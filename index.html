<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galeri Pribadi</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

.container{
padding:20px;
max-width:1000px;
margin:auto;
}

input{
margin:10px 0;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
gap:10px;
margin-top:20px;
}

.card{
position:relative;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:8px;
}

.deleteBtn{
position:absolute;
top:5px;
right:5px;
background:red;
border:none;
color:white;
padding:5px;
border-radius:5px;
cursor:pointer;
font-size:12px;
}

button{
padding:8px 12px;
border:none;
border-radius:6px;
cursor:pointer;
background:#1e293b;
color:white;
font-weight:bold;
}

button:hover{
background:#00c6ff;
}

</style>
</head>

<body>

<div class="container">

<h2>🖼 Galeri Foto Pribadi</h2>

<input type="file" id="upload" multiple accept="image/*">
<br>
<button onclick="clearGallery()">Hapus Semua</button>

<div class="gallery" id="gallery"></div>

</div>

<script>

const upload=document.getElementById("upload");
const gallery=document.getElementById("gallery");

let photos=JSON.parse(localStorage.getItem("myGallery")) || [];

function saveToStorage(){
localStorage.setItem("myGallery",JSON.stringify(photos));
}

function renderGallery(){
gallery.innerHTML="";

photos.forEach((photo,index)=>{

const div=document.createElement("div");
div.className="card";

const img=document.createElement("img");
img.src=photo;

const btn=document.createElement("button");
btn.className="deleteBtn";
btn.innerText="X";

btn.onclick=function(){
photos.splice(index,1);
saveToStorage();
renderGallery();
}

div.appendChild(img);
div.appendChild(btn);
gallery.appendChild(div);

});
}

upload.addEventListener("change",function(){

const files=this.files;

for(let file of files){

const reader=new FileReader();

reader.onload=function(e){
photos.push(e.target.result);
saveToStorage();
renderGallery();
}

reader.readAsDataURL(file);

}

});

function clearGallery(){
if(confirm("Yakin hapus semua foto?")){
photos=[];
saveToStorage();
renderGallery();
}
}

renderGallery();

</script>

</body>
</html>
