<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Editor Numeric Crop</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

.container{
padding:20px;
max-width:1000px;
margin:auto;
}

canvas{
max-width:100%;
background:white;
border-radius:10px;
margin-top:15px;
}

input, button{
padding:8px;
margin:5px;
border-radius:6px;
border:none;
}

button{
cursor:pointer;
background:#1e293b;
color:white;
font-weight:bold;
}

button:hover{
background:#00c6ff;
}

.controls{
margin-top:15px;
}

</style>
</head>

<body>

<div class="container">

<h2>🖼 Image Editor - Numeric Crop</h2>

<input type="file" id="upload" accept="image/*">

<br><br>

<canvas id="canvas"></canvas>

<div class="controls">

<h3>🎨 Filter</h3>

<button onclick="setFilter('none')">Normal</button>
<button onclick="setFilter('grayscale(100%)')">Grayscale</button>
<button onclick="setFilter('sepia(100%)')">Sepia</button>
<button onclick="setFilter('contrast(180%)')">Contrast</button>
<button onclick="setFilter('brightness(130%)')">Bright</button>

<h3>✂ Crop Pakai Angka</h3>

<input type="number" id="cropWidth" placeholder="Width">
<input type="number" id="cropHeight" placeholder="Height">
<br>
<button onclick="cropByNumber()">Crop Sekarang</button>

<h3>📥 Download</h3>

<button onclick="downloadImage()">Download</button>

</div>

</div>

<script>

const upload=document.getElementById("upload");
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

let img=new Image();
let currentFilter="none";

upload.addEventListener("change",function(){

const file=this.files[0];
if(!file) return;

const reader=new FileReader();

reader.onload=function(e){

img.onload=function(){

canvas.width=img.width;
canvas.height=img.height;

ctx.drawImage(img,0,0);

}

img.src=e.target.result;

}

reader.readAsDataURL(file);

});

function setFilter(filter){

currentFilter=filter;

ctx.filter=currentFilter;
ctx.drawImage(img,0,0,canvas.width,canvas.height);
ctx.filter="none";

}

function cropByNumber(){

const newWidth=parseInt(document.getElementById("cropWidth").value);
const newHeight=parseInt(document.getElementById("cropHeight").value);

if(!newWidth || !newHeight){
alert("Masukkan width dan height dulu!");
return;
}

const temp=document.createElement("canvas");
const tctx=temp.getContext("2d");

temp.width=newWidth;
temp.height=newHeight;

tctx.drawImage(canvas,0,0,newWidth,newHeight);

canvas.width=newWidth;
canvas.height=newHeight;

ctx.drawImage(temp,0,0);

}

function downloadImage(){

const link=document.createElement("a");
link.download="edited-image.png";
link.href=canvas.toDataURL("image/png");
link.click();

}

</script>

</body>
</html>
